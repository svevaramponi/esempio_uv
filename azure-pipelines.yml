# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

jobs:
- job: build
  pool:
    vmImage: ubuntu-latest

  steps:
  - script: curl -LsSf https://astral.sh/uv/install.sh | sh
    displayName: 'istallazione uv'

  - script: uv sync --all-extras --dev
    displayName: 'istallazione dipendenze'

  - script: uv run python -m pytest
  displayName: 'test'

